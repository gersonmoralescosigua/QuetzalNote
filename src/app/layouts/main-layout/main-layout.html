<!-- =============================================== -->
<!-- SECCIÓN: MAIN LAYOUT - ESTRUCTURA PRINCIPAL     -->
<!-- Propósito: Es el esqueleto de toda la aplicación -->
<!-- =============================================== -->

<div
  class="flex h-screen w-full bg-[#F4F6F7] dark:bg-gray-900 overflow-hidden font-sans text-gray-800 dark:text-gray-100 relative"
>
  <!-- >>> ZONA: SIDEBAR LATERAL <<< -->
  <!-- Aquí va el menú lateral de navegación. Se colapsa a 68px cuando está cerrado -->
  <aside
    [ngClass]="ui.isSidebarOpen() ? 'w-[260px]' : 'w-[68px]'"
    class="flex-shrink-0 border-r border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 transition-all duration-300 z-20"
  >
    <app-sidebar></app-sidebar>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 relative">
    <!-- =========================================== -->
    <!-- VISTA PRINCIPAL (CUANDO NO HAY LOGIN)       -->
    <!-- =========================================== -->
    <ng-container *ngIf="!ui.isLoginOpen()">
      <!-- >>> ZONA: TOPBAR SUPERIOR <<< -->
      <!-- Aquí va la barra superior con título, búsqueda y botones de usuario -->
      <header
        class="h-[60px] flex-shrink-0 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-4 flex items-center"
      >
        <app-topbar class="block w-full"></app-topbar>
      </header>

      <!-- >>> ZONA: CONTENIDO PRINCIPAL (SCROLLABLE) <<< -->
      <section class="flex-1 overflow-auto p-4 md:p-6 lg:p-8">
        <div
          class="bg-white dark:bg-gray-800 shadow-sm border border-gray-200 dark:border-gray-700 rounded-lg h-full flex flex-col max-w-5xl mx-auto relative overflow-hidden"
        >
          <!-- >>> ZONA: BARRA DE HERRAMIENTAS DEL EDITOR <<< -->
          <div
            *ngIf="notesService.selectedNote()?.id"
            class="h-[50px] flex-shrink-0 px-4 flex items-center border-b-[3px] border-[#18639c] dark:border-blue-500 w-full bg-white dark:bg-gray-800"
          >
            <app-editor-toolbar class="block w-full"></app-editor-toolbar>
          </div>

          <!-- >>> ZONA: EDITOR DE NOTAS <<< -->
          <!-- Estado dinámico: Se muestra cuando currentView === 'editor' -->
          <div *ngIf="ui.currentView() === 'editor'" class="flex-1 relative">
            <app-note-editor *ngIf="notesService.selectedNote()?.id; else emptyState"></app-note-editor>
            <ng-template #emptyState>
              <app-empty-notes></app-empty-notes>
            </ng-template>
          </div>

          <!-- >>> ZONA: CONVERSOR PDF <<< -->
          <!-- Estado dinámico: Se muestra cuando currentView === 'pdf' -->
          <div *ngIf="ui.currentView() === 'pdf'" class="flex-1 p-8 flex flex-col relative pb-16">
            <!-- Dato dinámico: El texto que el usuario escribe para convertir a PDF -->
            <textarea
              placeholder="Enter or paste your text here"
              class="w-full flex-1 resize-none border-none outline-none bg-transparent text-[18px] text-gray-800 dark:text-gray-100 placeholder-gray-400 font-sans leading-relaxed"
            ></textarea>

            <!-- Botón para cargar documento de ejemplo -->
            <button
              class="absolute top-16 left-8 flex items-center gap-2 bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600 text-gray-500 dark:text-gray-300 px-3 py-1.5 rounded-full transition-colors text-[13px] font-medium w-fit"
            >
              <span class="material-icons text-[18px]">add</span> Sample Document
            </button>

            <!-- >>> ZONA: BARRA INFERIOR DEL PDF <<< -->
            <div
              class="absolute bottom-6 left-8 right-8 flex items-center justify-between text-gray-500 dark:text-gray-400 bg-white dark:bg-gray-800 pt-2 border-t border-gray-100 dark:border-gray-700"
            >
              <!-- Botón para subir documento -->
              <button
                class="flex items-center gap-2 hover:text-gray-800 dark:hover:text-white transition-colors"
              >
                <span class="material-icons text-[18px]">upload</span>
                <span class="text-[13px] font-medium">Upload Doc</span>
              </button>

              <!-- Botón principal de conversión a PDF -->
              <button
                class="bg-[#18639c] hover:bg-[#145382] text-white px-8 py-2 rounded text-[14px] font-medium transition-colors shadow-sm absolute left-1/2 -translate-x-1/2"
              >
                Convert to PDF
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- >>> ZONA: POPUP DE PAPELERA (TRASH) <<< -->
      <!-- Estado dinámico: Visible solo cuando ui.isTrashOpen() es true -->
      <!-- Posición dinámica: Se ajusta según si el sidebar está abierto o cerrado -->
      <div
        [ngClass]="
          ui.isTrashOpen()
            ? 'opacity-100 translate-y-0 visible'
            : 'opacity-0 translate-y-2 invisible pointer-events-none'
        "
        [style.left]="ui.isSidebarOpen() ? '275px' : '83px'"
        class="absolute bottom-20 w-[360px] bg-white dark:bg-gray-800 shadow-xl border border-gray-200 dark:border-gray-700 rounded-xl p-5 z-30 transition-all duration-200 ease-in-out"
      >
        <!-- Buscador dentro de la papelera -->
        <div
          class="flex items-center gap-2 text-gray-400 mb-4 bg-gray-50 dark:bg-gray-700/50 rounded-lg px-3 py-2 border border-gray-100 dark:border-gray-600"
        >
          <span class="material-icons text-[18px]">search</span>
          <input
            type="text"
            placeholder="Search trash notes..."
            class="bg-transparent border-none outline-none text-[13px] w-full text-gray-700 dark:text-gray-200 focus:ring-0"
          />
        </div>

        <!-- >>> ITEM DE NOTA EN PAPELERA <<< -->
        <!-- Dato dinámico: Título de la nota eliminada -->
        <!-- Dato dinámico: Fecha de eliminación -->
        <div
          *ngFor="let note of trashedNotes()"
          class="flex justify-between items-center group cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700/50 p-2 rounded transition-colors"
        >
          <div>
            <h4 class="text-[13px] font-medium text-gray-800 dark:text-gray-200">
              {{ note.titulo }}
            </h4>
            <p class="text-[11px] text-gray-500 mt-0.5">{{ note.fechaActualizacion }}</p>
          </div>
          <div class="flex gap-4 opacity-0 group-hover:opacity-100 transition-opacity">
            <!-- Botón restaurar nota -->
            <span
              (click)="restoreNote(note)"
              class="material-icons text-[16px] text-gray-400 hover:text-gray-800 dark:hover:text-white transition-colors cursor-pointer"
              >undo</span
            >
            <!-- Botón eliminar permanentemente -->
            <span
              (click)="permanentDeleteNote(note)"
              class="material-icons text-[16px] text-gray-400 hover:text-red-500 transition-colors cursor-pointer"
              >delete_outline</span
            >
          </div>
        </div>
      </div>
    </ng-container>

    <!-- =========================================== -->
    <!-- VISTA DE LOGIN (CUANDO isLoginOpen ES TRUE) -->
    <!-- =========================================== -->
    <ng-container *ngIf="ui.isLoginOpen()">
      <div
        class="flex-1 bg-white dark:bg-gray-900 overflow-y-auto flex items-center justify-center p-6 relative"
      >
        <!-- Botón para volver a las notas -->
        <button
          (click)="ui.isLoginOpen.set(false)"
          class="absolute top-6 left-6 flex items-center gap-2 text-gray-500 hover:text-gray-800 dark:hover:text-white transition-colors text-[14px] font-medium z-10"
        >
          <span class="material-icons text-[18px]">arrow_back</span> Back to notes
        </button>

        <!-- >>> FORMULARIO DE LOGIN <<< -->
        <div class="w-full max-w-[440px] flex flex-col bg-white dark:bg-gray-900 p-2">
          <h2 class="text-center text-[32px] font-bold text-gray-800 dark:text-white mb-6">
            Welcome Back
          </h2>

          <!-- Botón login con Google -->
          <button
            class="w-full h-11 border border-gray-200 dark:border-gray-700 rounded-lg flex items-center justify-center gap-3 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors text-[14px] font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-900 shadow-sm"
          >
            <svg class="w-5 h-5" viewBox="0 0 24 24">
              <path
                fill="#EA4335"
                d="M5.266 9.765A7.077 7.077 0 0 1 12 4.909c1.69 0 3.218.6 4.418 1.582L19.91 3A11.95 11.95 0 0 0 12 0C7.26 0 3.193 2.573 1.023 6.377l4.243 3.388z"
              />
              <path
                fill="#4285F4"
                d="M23.755 12.273c0-.818-.068-1.609-.2-2.364H12v4.51h6.605a5.666 5.666 0 0 1-2.455 3.713v3.082h3.96c2.313-2.132 3.64-5.268 3.64-8.94z"
              />
              <path
                fill="#FBBC05"
                d="M5.266 14.235A7.09 7.09 0 0 1 4.909 12c0-.79.132-1.55.357-2.265L1.023 6.377A11.954 11.954 0 0 0 0 12c0 2.114.555 4.1 1.527 5.83l3.739-3.595z"
              />
              <path
                fill="#34A853"
                d="M12 24c3.24 0 5.955-1.077 7.94-2.918l-3.96-3.082c-1.1.736-2.514 1.182-3.98 1.182-3.045 0-5.618-2.055-6.54-4.823L1.217 17.84A11.947 11.947 0 0 0 12 24z"
              />
            </svg>
            Continue with Google
          </button>

          <div class="flex items-center my-6">
            <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
            <span
              class="px-4 text-gray-400 text-[13px] uppercase tracking-wider bg-white dark:bg-gray-900"
              >or</span
            >
            <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
          </div>

          <!-- Campo Email -->
          <div class="space-y-4">
            <div>
              <label class="block text-[14px] font-medium text-gray-700 dark:text-gray-300 mb-1.5"
                >Email</label
              >
              <!-- Dato dinámico: email del usuario -->
              <input
                type="email"
                placeholder="Enter email"
                class="w-full h-11 border border-gray-200 dark:border-gray-700 rounded-xl px-4 bg-gray-50/50 dark:bg-gray-800/50 text-[14px] outline-none focus:border-blue-500 text-gray-800 dark:text-gray-100"
              />
            </div>

            <!-- Campo Password -->
            <div>
              <label class="block text-[14px] font-medium text-gray-700 dark:text-gray-300 mb-1.5"
                >Password</label
              >
              <div class="relative flex items-center">
                <!-- Dato dinámico: password del usuario -->
                <input
                  type="password"
                  placeholder="Enter password"
                  class="w-full h-11 border border-gray-200 dark:border-gray-700 rounded-xl px-4 pr-12 bg-gray-50/50 dark:bg-gray-800/50 text-[14px] outline-none focus:border-blue-500 text-gray-800 dark:text-gray-100"
                />
                <!-- Botón toggle para mostrar/ocultar password -->
                <span
                  class="material-icons absolute right-4 text-gray-400 cursor-pointer text-[20px] select-none"
                  >visibility_off</span
                >
              </div>
            </div>
          </div>

          <!-- Enlace "Olvidé mi contraseña" -->
          <div class="flex justify-end mt-2.5">
            <a class="text-[13px] text-gray-500 hover:text-[#18639c] hover:underline cursor-pointer"
              >Forget Password?</a
            >
          </div>

          <!-- Botón de Sign In -->
          <button
            class="w-full h-11 bg-[#18639c] hover:bg-[#145382] text-white font-medium rounded-xl text-[15px] mt-6 transition-colors shadow-sm"
          >
            Sign in
          </button>

          <!-- Enlace para registrarse -->
          <p class="text-center text-[14px] text-gray-600 dark:text-gray-400 mt-6">
            Don't have an account?<a
              class="text-[#18639c] font-bold hover:underline cursor-pointer ml-1"
              >Register</a
            >
          </p>
        </div>
      </div>
    </ng-container>
  </main>

  <app-loader *ngIf="notesService.isLoading()"></app-loader>

  <!-- =========================================== -->
  <!-- MODAL DE FEEDBACK (OPINIÓN DEL USUARIO)    -->
  <!-- =========================================== -->
  <div
    *ngIf="ui.isFeedbackOpen()"
    class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/40 backdrop-blur-sm transition-opacity"
  >
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-[540px] p-6 relative">
      <!-- Botón cerrar modal -->
      <button
        (click)="ui.closeFeedback()"
        class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 border border-gray-200 dark:border-gray-600 rounded-full w-8 h-8 flex items-center justify-center hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors"
      >
        <span class="material-icons text-[18px]">close</span>
      </button>

      <h3 class="text-[18px] font-bold text-gray-800 dark:text-white">Give Feedback</h3>
      <p class="text-gray-600 dark:text-gray-300 text-[15px] mt-1 mb-6">
        What do you feel about onlinenotepad.io?
      </p>

      <!-- >>> PASO 1: SELECCIÓN DE EMOJI <<< -->
      <!-- Estado dinámico: ui.feedbackStep() === 1 -->
      <div
        *ngIf="ui.feedbackStep() === 1"
        class="flex justify-between items-center gap-2 mt-2 animate-fade-in"
      >
        <!-- Cada emoji envía a step 2 con el valor seleccionado -->
        <button (click)="ui.feedbackStep.set(2)" class="flex flex-col items-center gap-2 group">
          <div
            class="w-14 h-14 rounded-full bg-red-50 dark:bg-red-900/30 flex items-center justify-center group-hover:bg-red-100 transition-colors border border-transparent"
          >
            <span
              class="material-icons text-red-500 text-[32px] group-hover:scale-110 transition-transform"
              >sentiment_very_dissatisfied</span
            >
          </div>
          <span class="text-[13px] text-gray-500 group-hover:text-gray-700 font-medium"
            >Terrible</span
          >
        </button>

        <button (click)="ui.feedbackStep.set(2)" class="flex flex-col items-center gap-2 group">
          <div
            class="w-14 h-14 rounded-full bg-orange-50 dark:bg-orange-900/30 flex items-center justify-center group-hover:bg-orange-100 transition-colors border border-transparent"
          >
            <span
              class="material-icons text-orange-500 text-[32px] group-hover:scale-110 transition-transform"
              >sentiment_dissatisfied</span
            >
          </div>
          <span class="text-[13px] text-gray-500 group-hover:text-gray-700 font-medium">Bad</span>
        </button>

        <button (click)="ui.feedbackStep.set(2)" class="flex flex-col items-center gap-2 group">
          <div
            class="w-14 h-14 rounded-full bg-yellow-50 dark:bg-yellow-900/30 flex items-center justify-center group-hover:bg-yellow-100 transition-colors border border-transparent"
          >
            <span
              class="material-icons text-yellow-500 text-[32px] group-hover:scale-110 transition-transform"
              >sentiment_neutral</span
            >
          </div>
          <span class="text-[13px] text-gray-500 group-hover:text-gray-700 font-medium"
            >Average</span
          >
        </button>

        <button (click)="ui.feedbackStep.set(2)" class="flex flex-col items-center gap-2 group">
          <div
            class="w-14 h-14 rounded-full bg-green-50 dark:bg-green-900/30 flex items-center justify-center group-hover:bg-green-100 transition-colors border border-transparent"
          >
            <span
              class="material-icons text-green-500 text-[32px] group-hover:scale-110 transition-transform"
              >sentiment_satisfied</span
            >
          </div>
          <span class="text-[13px] text-gray-500 group-hover:text-gray-700 font-medium">Good</span>
        </button>

        <button (click)="ui.feedbackStep.set(2)" class="flex flex-col items-center gap-2 group">
          <div
            class="w-14 h-14 rounded-full bg-teal-50 dark:bg-teal-900/30 flex items-center justify-center group-hover:bg-teal-100 transition-colors border border-transparent"
          >
            <span
              class="material-icons text-teal-500 text-[32px] group-hover:scale-110 transition-transform"
              >sentiment_very_satisfied</span
            >
          </div>
          <span class="text-[13px] text-gray-500 group-hover:text-gray-700 font-medium"
            >Amazing</span
          >
        </button>
      </div>

      <!-- >>> PASO 2: TEXTO DEL FEEDBACK <<< -->
      <!-- Estado dinámico: ui.feedbackStep() === 2 -->
      <div
        *ngIf="ui.feedbackStep() === 2"
        class="relative mt-2 animate-fade-in flex items-center pr-4"
      >
        <!-- Dato dinámico: mensaje de feedback del usuario -->
        <textarea
          placeholder="Write your message here"
          class="w-full h-[140px] p-4 border border-gray-300 dark:border-gray-600 rounded-lg resize-none outline-none focus:border-blue-500 text-[14px] text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-800"
        ></textarea>

        <!-- Botón enviar feedback -->
        <button
          (click)="ui.closeFeedback()"
          class="absolute -right-2 bg-black dark:bg-gray-700 text-white w-12 h-12 flex items-center justify-center rounded-full hover:scale-105 hover:bg-gray-800 transition-all shadow-md"
        >
          <span class="material-icons text-[20px] ml-1">send</span>
        </button>
      </div>
    </div>
  </div>
</div>
