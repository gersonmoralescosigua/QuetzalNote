<!-- topbar.html — barra de navegación superior -->

<!-- panel de idiomas -->
<ng-template #langPanel>
  <div class="absolute right-[105%] top-0 w-48 bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-100 dark:border-gray-700 py-2 z-50 mr-1 animate-fade-in">
    <div class="px-4 py-2 text-[12px] text-gray-400 flex items-center justify-between border-b border-gray-100 dark:border-gray-700 mb-1">
      {{ i18n.t('siteLanguage') }}
      <img src="assets/icons/Info.svg" class="w-4 h-4 icon-adaptive">
    </div>
    <button
      *ngFor="let lang of i18n.LANGUAGES"
      (click)="setLanguage(lang.code)"
      class="w-full flex items-center justify-between px-4 py-2 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 text-[14px] transition-colors"
    >
      <span class="flex items-center gap-2">
        <span>{{ lang.flag }}</span>
        {{ lang.label }}
      </span>
      <span *ngIf="i18n.currentLang() === lang.code" class="material-icons text-[16px] text-teal-500">check</span>
    </button>
  </div>
</ng-template>

<!-- dropdown del usuario -->
<ng-template #userDropdown>
  <div
    *ngIf="isUserMenuOpen()"
    class="absolute right-0 top-12 w-52 bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-100 dark:border-gray-700 py-2 z-50 animate-fade-in"
  >
    <!-- AUTENTICADO -->
    <ng-container *ngIf="authService.isAuthenticated()">
      <div class="px-4 py-2 border-b border-gray-100 dark:border-gray-700 mb-1">
        <p class="text-[13px] font-semibold text-gray-800 dark:text-gray-100 truncate">{{ authService.currentUser()?.displayName }}</p>
        <p class="text-[11px] text-gray-400 truncate">{{ authService.currentUser()?.email }}</p>
      </div>
      <!-- Idioma -->
      <div class="relative">
        <button (click)="isLanguageMenuOpen.update((v) => !v)" class="w-full flex items-center justify-between px-4 py-2 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 text-[14px] transition-colors">
          <div class="flex items-center gap-3">
            <img src="assets/icons/language.svg" class="w-4 h-4 icon-adaptive">
            {{ i18n.currentLangLabel() }}
          </div>
          <img src="assets/icons/subMenuArrow.svg" class="w-3 h-3 icon-adaptive">
        </button>
        <ng-container *ngIf="isLanguageMenuOpen()">
          <ng-container *ngTemplateOutlet="langPanel"></ng-container>
        </ng-container>
      </div>
      <!-- Contacto -->
      <button (click)="ui.currentView.set('contact'); toggleUserMenu()" class="w-full flex items-center gap-3 px-4 py-2 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 text-[14px] transition-colors">
        <img src="assets/icons/Chat.svg" class="w-4 h-4 icon-adaptive">
        {{ i18n.t('contactUs') }}
      </button>
      <!-- Logout -->
      <button (click)="signOut()" class="w-full flex items-center gap-3 px-4 py-2 hover:bg-gray-50 dark:hover:bg-gray-700 text-red-500 text-[14px] transition-colors">
        <img src="assets/icons/mobile_close_icon.svg" class="w-4 h-4 icon-adaptive">
        {{ i18n.t('signOut') }}
      </button>
    </ng-container>

    <!-- NO AUTENTICADO -->
    <ng-container *ngIf="!authService.isAuthenticated()">
      <button (click)="openLogin()" class="w-full flex items-center gap-3 px-4 py-2 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 text-[14px] transition-colors">
        <img src="assets/icons/register.svg" class="w-4 h-4 icon-adaptive">
        {{ i18n.t('signIn') }}
      </button>
      <div class="relative">
        <button (click)="isLanguageMenuOpen.update((v) => !v)" class="w-full flex items-center justify-between px-4 py-2 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 text-[14px] transition-colors">
          <div class="flex items-center gap-3">
            <img src="assets/icons/language.svg" class="w-4 h-4 icon-adaptive">
            {{ i18n.currentLangLabel() }}
          </div>
          <img src="assets/icons/subMenuArrow.svg" class="w-3 h-3 icon-adaptive">
        </button>
        <ng-container *ngIf="isLanguageMenuOpen()">
          <ng-container *ngTemplateOutlet="langPanel"></ng-container>
        </ng-container>
      </div>
      <button (click)="ui.currentView.set('contact'); toggleUserMenu()" class="w-full flex items-center gap-3 px-4 py-2 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 text-[14px] transition-colors">
        <img src="assets/icons/Chat.svg" class="w-4 h-4 icon-adaptive">
        {{ i18n.t('contactUs') }}
      </button>
    </ng-container>
  </div>
</ng-template>

<!-- botón de usuario: foto, iniciales o ícono genérico -->
<ng-template #userBtn>
  <div class="relative">
    <button (click)="toggleUserMenu()" class="min-w-[32px] min-h-[32px] flex items-center justify-center rounded border border-[#eceef0] dark:border-[#424242] hover:bg-[#F0F0F0] dark:hover:bg-[#252525] transition-colors">
      <!-- Foto de perfil -->
      <img
        *ngIf="authService.isAuthenticated() && authService.currentUser()?.photoUrl"
        [src]="authService.currentUser()!.photoUrl"
        [alt]="authService.currentUser()!.displayName"
        class="w-7 h-7 rounded-full object-cover"
      />
      <!-- Iniciales (sin foto) -->
      <span
        *ngIf="authService.isAuthenticated() && !authService.currentUser()?.photoUrl"
        class="w-7 h-7 rounded-full bg-[#18639c] text-white text-[11px] font-bold flex items-center justify-center select-none"
      >{{ (authService.currentUser()?.displayName?.split(' ')?.[0] || '').charAt(0).toUpperCase() }}{{ (authService.currentUser()?.displayName?.split(' ')?.[1] || '').charAt(0).toUpperCase() }}</span>
      <!-- Ícono genérico -->
      <img *ngIf="!authService.isAuthenticated()" src="assets/icons/account_profile_icon.svg" class="w-5 h-5 icon-adaptive">
    </button>
    <ng-container *ngTemplateOutlet="userDropdown"></ng-container>
  </div>
</ng-template>

<!-- hamburger -->
<ng-template #hamburger>
  <button (click)="ui.toggleSidebar()" class="text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 p-1.5 rounded transition-colors flex-shrink-0 group">
    <img *ngIf="ui.isSidebarOpen()" src="assets/icons/menu-mid.svg" class="w-6 h-6 icon-adaptive group-hover:hidden">
    <img *ngIf="ui.isSidebarOpen()" src="assets/icons/menu-1-close.svg" class="w-6 h-6 icon-adaptive hidden group-hover:block">
    <img *ngIf="!ui.isSidebarOpen()" src="assets/icons/menu-mid.svg" class="w-6 h-6 icon-adaptive">
  </button>
</ng-template>

<!-- logo -->
<ng-template #logoBlock>
  <div class="hidden md:flex items-center gap-2 flex-shrink-0">
    <img src="assets/icons/logo.svg" class="w-[30px] h-[30px] flex-shrink-0">
    <span class="font-bold text-[12px] leading-tight text-gray-800 dark:text-white">Online<br>Notepad</span>
  </div>
</ng-template>

<!-- contenido del topbar (cambia según la vista activa) -->
<div
  class="flex w-full h-full items-center justify-between border-b border-gray-200 dark:border-gray-700"
  style="height:48px; max-height:48px; padding: 0 12px; background: var(--color-white-2);"
>

  <!-- editor -->
  <ng-container *ngIf="ui.currentView() === 'editor'">
    <!-- Izquierda: hamburger + logo + título + guardado -->
    <div class="flex items-center gap-2 min-w-0 flex-1 mr-2">
      <ng-container *ngTemplateOutlet="hamburger"></ng-container>
      <ng-container *ngTemplateOutlet="logoBlock"></ng-container>
      <!-- Título de la nota -->
      <div
        class="ml-4 border border-[#eceef0] dark:border-[#424242] rounded flex items-center bg-white dark:bg-gray-900 hover:border-gray-300 transition-colors flex-shrink-0"
        style="min-width:180px; max-width:200px; width:200px;"
      >
        <input
          #titleInput
          (click)="$event.stopPropagation()"
          type="text"
          [placeholder]="i18n.t('untitledDocument')"
          (blur)="updateTitle()"
          (keydown.enter)="updateTitle(); titleInput.blur()"
          class="border-none focus:ring-0 text-gray-700 dark:text-gray-200 p-0 px-3 py-1.5 w-full outline-none bg-transparent truncate"
          style="font-size:14px; font-weight:400; line-height:20px; max-height:32px;"
        />
      </div>
      <!-- Indicador de guardado -->
      <div class="flex items-center text-[12px] text-gray-400 flex-shrink-0 ml-1">
        <span *ngIf="ui.isSaving()" class="flex items-center gap-1">
          <img src="assets/icons/saving_note_content_icon.svg" class="w-3 h-3 icon-adaptive animate-spin">
          {{ i18n.t('saving') }}
        </span>
        <span *ngIf="!ui.isSaving() && ui.lastSaved()" class="flex items-center gap-1">
          <img src="assets/icons/saving_note_content_icon.svg" class="w-3 h-3 icon-adaptive">
          {{ i18n.t('saved') }}
        </span>
      </div>
    </div>

    <!-- Derecha: búsqueda + tema + chat + usuario -->
    <div class="flex items-center gap-2 text-gray-500 dark:text-gray-400 flex-shrink-0">
      <!-- Búsqueda desktop -->
      <div
        (click)="ui.isSearchModalOpen.set(true)"
        class="hidden md:flex items-center gap-1 bg-white dark:bg-[#181818] border border-[#eceef0] dark:border-[#424242] rounded px-2 py-1 cursor-pointer hover:bg-[#F4F6F7] transition-colors"
        style="min-height:32px;"
      >
        <img src="assets/icons/Search.svg" class="w-4 h-4 icon-adaptive">
        <span class="text-[13px] w-28 text-gray-400 select-none">{{ i18n.t('searchNotes') }}</span>
        <span class="text-[10px] text-gray-400 font-semibold border border-gray-300 dark:border-gray-500 rounded px-1.5 ml-2">Ctrl K</span>
      </div>
      <!-- Búsqueda mobile -->
      <button class="md:hidden flex items-center justify-center min-w-[32px] min-h-[32px] rounded border border-[#eceef0] dark:border-[#424242] hover:bg-[#F0F0F0] transition-colors" (click)="ui.isSearchModalOpen.set(true)">
        <img src="assets/icons/Search.svg" class="w-4 h-4 icon-adaptive">
      </button>
      <!-- Tema -->
      <button (click)="toggleTheme()" class="min-w-[32px] min-h-[32px] flex items-center justify-center rounded border border-[#eceef0] dark:border-[#424242] hover:bg-[#F0F0F0] dark:hover:bg-[#252525] transition-colors">
        <img *ngIf="!isDarkMode()" src="assets/icons/mobile_dark_moon_icon.svg" class="w-5 h-5 icon-adaptive">
        <img *ngIf="isDarkMode()" src="assets/icons/sun_light_mode.svg" class="w-5 h-5" style="filter:var(--filter-inverse)">
      </button>
      <!-- Chat -->
      <button (click)="ui.currentView.set('contact')" class="min-w-[32px] min-h-[32px] flex items-center justify-center rounded border border-[#eceef0] dark:border-[#424242] hover:bg-[#F0F0F0] dark:hover:bg-[#252525] transition-colors">
        <img src="assets/icons/Chat.svg" class="w-5 h-5 icon-adaptive">
      </button>
      <!-- Usuario -->
      <ng-container *ngTemplateOutlet="userBtn"></ng-container>
    </div>
  </ng-container>

  <!-- pdf converter -->
  <ng-container *ngIf="ui.currentView() === 'pdf'">
    <div class="flex items-center gap-2 flex-shrink-0">
      <ng-container *ngTemplateOutlet="hamburger"></ng-container>
      <ng-container *ngTemplateOutlet="logoBlock"></ng-container>
    </div>
    <div class="absolute left-1/2 -translate-x-1/2 pointer-events-none">
      <h2 class="text-[15px] font-bold text-gray-800 dark:text-white tracking-wide">{{ i18n.t('textToPdfTitle') }}</h2>
    </div>
    <div class="flex items-center gap-2 text-gray-500 dark:text-gray-400 flex-shrink-0">
      <button (click)="toggleTheme()" class="min-w-[32px] min-h-[32px] flex items-center justify-center rounded border border-[#eceef0] dark:border-[#424242] hover:bg-[#F0F0F0] dark:hover:bg-[#252525] transition-colors">
        <img *ngIf="!isDarkMode()" src="assets/icons/mobile_dark_moon_icon.svg" class="w-5 h-5 icon-adaptive">
        <img *ngIf="isDarkMode()" src="assets/icons/sun_light_mode.svg" class="w-5 h-5" style="filter:var(--filter-inverse)">
      </button>
      <button (click)="ui.currentView.set('contact')" class="min-w-[32px] min-h-[32px] flex items-center justify-center rounded border border-[#eceef0] dark:border-[#424242] hover:bg-[#F0F0F0] dark:hover:bg-[#252525] transition-colors">
        <img src="assets/icons/Chat.svg" class="w-5 h-5 icon-adaptive">
      </button>
      <ng-container *ngTemplateOutlet="userBtn"></ng-container>
    </div>
  </ng-container>

  <!-- paraphraser -->
  <ng-container *ngIf="ui.currentView() === 'paraphraser'">
    <div class="flex items-center gap-2 flex-shrink-0">
      <ng-container *ngTemplateOutlet="hamburger"></ng-container>
      <ng-container *ngTemplateOutlet="logoBlock"></ng-container>
    </div>
    <div class="absolute left-1/2 -translate-x-1/2 pointer-events-none">
      <h2 class="text-[15px] font-bold text-gray-800 dark:text-white tracking-wide">{{ i18n.t('paraphraserTitle') }}</h2>
    </div>
    <div class="flex items-center gap-2 text-gray-500 dark:text-gray-400 flex-shrink-0">
      <button (click)="toggleTheme()" class="min-w-[32px] min-h-[32px] flex items-center justify-center rounded border border-[#eceef0] dark:border-[#424242] hover:bg-[#F0F0F0] dark:hover:bg-[#252525] transition-colors">
        <img *ngIf="!isDarkMode()" src="assets/icons/mobile_dark_moon_icon.svg" class="w-5 h-5 icon-adaptive">
        <img *ngIf="isDarkMode()" src="assets/icons/sun_light_mode.svg" class="w-5 h-5" style="filter:var(--filter-inverse)">
      </button>
      <button (click)="ui.currentView.set('contact')" class="min-w-[32px] min-h-[32px] flex items-center justify-center rounded border border-[#eceef0] dark:border-[#424242] hover:bg-[#F0F0F0] dark:hover:bg-[#252525] transition-colors">
        <img src="assets/icons/Chat.svg" class="w-5 h-5 icon-adaptive">
      </button>
      <ng-container *ngTemplateOutlet="userBtn"></ng-container>
    </div>
  </ng-container>

  <!-- contact us -->
  <ng-container *ngIf="ui.currentView() === 'contact'">
    <div class="flex items-center gap-2 flex-shrink-0">
      <ng-container *ngTemplateOutlet="hamburger"></ng-container>
      <ng-container *ngTemplateOutlet="logoBlock
