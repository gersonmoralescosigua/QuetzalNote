<!-- editor-toolbar.html — toolbar de Quill, reutilizable en editor y PDF -->

<!-- cuando hay un code block activo, se muestra solo undo/redo + selector de lenguaje -->
<ng-container *ngIf="isCode()">
  <div
    class="flex w-full items-center gap-1.5 text-gray-600 dark:text-gray-300 overflow-x-auto flex-nowrap scrollbar-hide"
  >
    <!-- Undo / Redo siempre presentes -->
    <button
      (click)="undo()"
      title="Undo (Ctrl+Z)"
      class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/arrow-counterclockwise-DvV_j1ZL.svg" class="w-5 h-5 icon-adaptive">
    </button>
    <button
      (click)="redo()"
      title="Redo (Ctrl+Y)"
      class="p-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors mr-2 flex-shrink-0"
    >
      <img src="assets/icons/arrow-clockwise-BEx5aIxD.svg" class="w-5 h-5 icon-adaptive">
    </button>

    <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1.5 flex-shrink-0"></div>

    <!-- Selector de lenguaje del código -->
    <button
      (click)="toggleLangMenu($event)"
      class="flex items-center gap-1 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/code-Bz7YqPM6.svg" class="w-5 h-5 icon-adaptive">
      <span class="text-[13px] font-mono">{{ currentLanguage() }}</span>
      <img src="assets/icons/chevron-down-q-2SJR92.svg" class="w-3 h-3 icon-adaptive">
    </button>

    <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1.5 flex-shrink-0"></div>

    <!-- Alineación (aplica también en code blocks) -->
    <button
      (click)="toggleAlignMenu($event)"
      class="flex items-center gap-1 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/text-left-BqhjlE8f.svg" class="w-5 h-5 icon-adaptive">
      <span class="text-[14px] font-medium">{{ alignLabel() }}</span>
    </button>

    <!-- Salir del code block -->
    <button
      (click)="setCodeBlockFromMenu()"
      title="Exit Code Block"
      class="ml-auto flex items-center gap-1 px-3 py-1.5 text-[12px] text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/mobile_close_icon.svg" class="w-5 h-5 icon-adaptive"> Exit code
    </button>
  </div>
</ng-container>

<!-- toolbar normal -->
<ng-container *ngIf="!isCode()">
  <div
    class="flex w-full items-center gap-1.5 text-gray-700 dark:text-gray-200 overflow-x-auto flex-nowrap scrollbar-hide"
  >
    <!-- undo / redo -->
    <button
      (click)="undo()"
      title="Undo (Ctrl+Z)"
      class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/arrow-counterclockwise-DvV_j1ZL.svg" class="w-5 h-5 icon-adaptive">
    </button>
    <button
      (click)="redo()"
      title="Redo (Ctrl+Y)"
      class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/arrow-clockwise-BEx5aIxD.svg" class="w-5 h-5 icon-adaptive">
    </button>

    <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1.5 flex-shrink-0"></div>

    <!-- fuente -->
    <button
      (click)="toggleFontMenu($event)"
      class="flex items-center gap-1 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/font-family-C3MgrJAJ.svg" class="w-5 h-5 icon-adaptive">
      <span class="text-[12px]">{{ currentFont() }}</span>
      <img src="assets/icons/chevron-down-q-2SJR92.svg" class="w-3 h-3 icon-adaptive">
    </button>

    <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1.5 flex-shrink-0"></div>

    <!-- ── Selector de tipo de bloque (Normal / H1 / H2…) ─────── -->
    <button
      (click)="toggleHeadingMenu($event)"
      class="flex items-center gap-1 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/text-paragraph-Udk-IEvz.svg" class="w-5 h-5 icon-adaptive">
      <span class="text-[12px]">{{ headingLabel() }}</span>
      <img src="assets/icons/chevron-down-q-2SJR92.svg" class="w-3 h-3 icon-adaptive">
    </button>

    <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1.5 flex-shrink-0"></div>

    <!-- tamaño -->
    <div class="flex items-center gap-0.5 flex-shrink-0">
      <button
        (click)="decreaseFontSize()"
        class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors"
      >
        <img src="assets/icons/minus-sign-C-NZTNRl.svg" class="w-3 h-3 icon-adaptive">
      </button>
      <span class="text-[13px] w-7 text-center select-none">{{ fontSize() }}</span>
      <button
        (click)="increaseFontSize()"
        class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors"
      >
        <img src="assets/icons/add-sign-DnNptbsR.svg" class="w-3 h-3 icon-adaptive">
      </button>
    </div>

    <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1.5 flex-shrink-0"></div>

    <!-- negrita -->
    <button
      (click)="toggleBold()"
      title="Bold (Ctrl+B)"
      [ngClass]="{ 'bg-gray-200 dark:bg-gray-600': isBold() }"
      class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/type-bold-nHyCpQJD.svg" class="w-5 h-5 icon-adaptive">
    </button>

    <!-- cursiva -->
    <button
      (click)="toggleItalic()"
      title="Italic (Ctrl+I)"
      [ngClass]="{ 'bg-gray-200 dark:bg-gray-600': isItalic() }"
      class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/type-italic-Y1uCGU3g.svg" class="w-5 h-5 icon-adaptive">
    </button>

    <!-- subrayado -->
    <button
      (click)="toggleUnderline()"
      title="Underline (Ctrl+U)"
      [ngClass]="{ 'bg-gray-200 dark:bg-gray-600': isUnderline() }"
      class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/type-underline-DWBZW6fe.svg" class="w-5 h-5 icon-adaptive">
    </button>

    <!-- código -->
    <button
      (click)="toggleCode()"
      title="Code Block"
      [ngClass]="{ 'bg-gray-200 dark:bg-gray-600': isCode() }"
      class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/code-Bz7YqPM6.svg" class="w-5 h-5 icon-adaptive">
    </button>

    <!-- link -->
    <button
      (click)="openLinkPopup()"
      title="Insert Link"
      class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/link-BGGrnw_x.svg" class="w-5 h-5 icon-adaptive">
    </button>

    <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1.5 flex-shrink-0"></div>

    <!-- color -->
    <button
      (click)="toggleColorMenu($event)"
      title="Text Color"
      class="flex items-center gap-1 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
        <img src="assets/icons/font-color-BytEaRp9.svg" class="w-5 h-5 icon-adaptive">
        <div style="width:16px;height:2px;border-radius:1px;"
             [style.background-color]="currentColor()">
        </div>
      </div>
      <img src="assets/icons/chevron-down-q-2SJR92.svg" class="w-3 h-3 icon-adaptive">
    </button>

    <!-- Aa: uppercase, lowercase, capitalize -->
    <button
      (click)="toggleAaMenu($event)"
      title="Text tools"
      class="flex items-center gap-0.5 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <span class="text-[13px] font-semibold">Aa</span>
      <img src="assets/icons/chevron-down-q-2SJR92.svg" class="w-3 h-3 icon-adaptive">
    </button>

    <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1.5 flex-shrink-0"></div>

    <!-- insertar -->
    <button
      (click)="toggleInsertMenu($event)"
      class="flex items-center gap-1 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/plus-DanGKpCK.svg" class="w-5 h-5 icon-adaptive">
      <span class="text-[12px]">Insert</span>
      <img src="assets/icons/chevron-down-q-2SJR92.svg" class="w-3 h-3 icon-adaptive">
    </button>

    <!-- alineación -->
    <button
      (click)="toggleAlignMenu($event)"
      class="flex items-center gap-1 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/text-left-BqhjlE8f.svg" class="w-5 h-5 icon-adaptive">
      <span class="text-[12px]">{{ alignLabel() }}</span>
      <img src="assets/icons/chevron-down-q-2SJR92.svg" class="w-3 h-3 icon-adaptive">
    </button>
  </div>
</ng-container>

<!-- dropdowns — fixed para escapar del overflow del toolbar -->

<!-- Dropdown: Fuente -->
<div
  *ngIf="isFontMenuOpen()"
  [style.top.px]="fontMenuPos().top"
  [style.left.px]="fontMenuPos().left"
  class="fixed bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg z-[9999] py-1 min-w-[170px]"
>
  <button
    *ngFor="let font of fonts"
    (click)="setFont(font)"
    [style.font-family]="font"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': currentFont() === font }"
    class="w-full text-left px-4 py-1.5 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    {{ font }}
  </button>
</div>

<!-- Dropdown: Tipo de bloque (Normal / Headings / Listas…) -->
<div
  *ngIf="isHeadingMenuOpen()"
  [style.top.px]="headingMenuPos().top"
  [style.left.px]="headingMenuPos().left"
  class="fixed bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg z-[9999] py-1 min-w-[230px]"
>
  <!-- Normal -->
  <button
    (click)="setHeading(false)"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': isNormalBlock() }"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_align_left</span>
      <span class="text-[14px] font-medium">Normal</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Alt+0</span>
  </button>
  <!-- H1 -->
  <button
    (click)="setHeading(1)"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': currentHeading() === 1 }"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    <span class="flex items-center gap-2">
      <span class="text-[11px] font-bold w-4 text-center text-gray-400">H1</span>
      <span class="text-[15px] font-bold">Heading 1</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Alt+1</span>
  </button>
  <!-- H2 -->
  <button
    (click)="setHeading(2)"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': currentHeading() === 2 }"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    <span class="flex items-center gap-2">
      <span class="text-[11px] font-bold w-4 text-center text-gray-400">H2</span>
      <span class="text-[14px] font-semibold">Heading 2</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Alt+2</span>
  </button>
  <!-- H3 -->
  <button
    (click)="setHeading(3)"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': currentHeading() === 3 }"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    <span class="flex items-center gap-2">
      <span class="text-[11px] font-bold w-4 text-center text-gray-400">H3</span>
      <span class="text-[13px] font-semibold">Heading 3</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Alt+3</span>
  </button>
  <div class="h-px bg-gray-100 dark:bg-gray-700 my-1 mx-3"></div>
  <!-- Numbered List -->
  <button
    (click)="setList('ordered')"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': currentList() === 'ordered' }"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_list_numbered</span>
      <span class="text-[14px] font-medium">Numbered List</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Shift+7</span>
  </button>
  <!-- Bullet List -->
  <button
    (click)="setList('bullet')"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': currentList() === 'bullet' }"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_list_bulleted</span>
      <span class="text-[14px] font-medium">Bullet List</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Shift+8</span>
  </button>
  <!-- Check List -->
  <button
    (click)="setList('check')"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': currentList() === 'check' }"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">checklist</span>
      <span class="text-[14px] font-medium">Check List</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Shift+9</span>
  </button>
  <div class="h-px bg-gray-100 dark:bg-gray-700 my-1 mx-3"></div>
  <!-- Quote -->
  <button
    (click)="setBlockquote()"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': isBlockquote() }"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_quote</span>
      <span class="text-[14px] font-medium">Quote</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Shift+B</span>
  </button>
</div>

<!-- Dropdown: Color de texto -->
<div
  *ngIf="isColorMenuOpen()"
  [style.top.px]="colorMenuPos().top"
  [style.left.px]="colorMenuPos().left"
  class="fixed bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg z-[9999] p-3 w-[220px]"
>
  <!-- Colores rápidos -->
  <div class="flex flex-wrap gap-1.5 mb-3">
    <button
      *ngFor="let c of quickColors"
      (click)="setColor(c)"
      [style.background]="c"
      [title]="c"
      class="w-5 h-5 rounded-full border border-white/30 hover:scale-110 transition-transform cursor-pointer"
    ></button>
  </div>
  <div class="h-px bg-gray-100 dark:bg-gray-700 mb-3"></div>
  <!-- Input HEX -->
  <div class="flex items-center gap-2">
    <div class="w-6 h-6 rounded border border-gray-300 flex-shrink-0" [style.background]="currentColor()"></div>
    <input
      type="text"
      [value]="hexInput()"
      (change)="applyHexColor($event)"
      placeholder="#000000"
      class="flex-1 border border-gray-200 dark:border-gray-600 rounded px-2 py-1 text-[12px] bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-200 outline-none focus:border-blue-400"
    >
  </div>
  <!-- Reset color -->
  <button
    (click)="setColor('#000000')"
    class="mt-2 w-full text-left text-[12px] text-gray-500 hover:text-gray-700 dark:hover:text-gray-200 px-1 py-1 rounded hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors"
  >
    Reset to default
  </button>
</div>

<!-- Dropdown: Aa — herramientas de texto -->
<div
  *ngIf="isAaMenuOpen()"
  [style.top.px]="aaMenuPos().top"
  [style.left.px]="aaMenuPos().left"
  class="fixed bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg z-[9999] py-1 min-w-[180px]"
>
  <button (click)="toUppercase()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="font-semibold text-[11px] text-gray-400 w-4">AA</span> Uppercase
  </button>
  <button (click)="toLowercase()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="font-semibold text-[11px] text-gray-400 w-4">aa</span> Lowercase
  </button>
  <button (click)="toCapitalize()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="font-semibold text-[11px] text-gray-400 w-4">Aa</span> Capitalize
  </button>
  <div class="h-px bg-gray-100 dark:bg-gray-700 my-1 mx-3"></div>
  <button (click)="toggleStrikethrough()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">strikethrough_s</span> Strikethrough
  </button>
  <button (click)="toggleSubscript()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">subscript</span> Subscript
  </button>
  <button (click)="toggleHighlight()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-yellow-400">highlight</span> Highlight
  </button>
  <div class="h-px bg-gray-100 dark:bg-gray-700 my-1 mx-3"></div>
  <button (click)="clearFormatting()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500">
    <span class="material-icons text-[16px]">format_clear</span> Clear Formatting
  </button>
</div>

<!-- Dropdown: Insert -->
<div
  *ngIf="isInsertMenuOpen()"
  [style.top.px]="insertMenuPos().top"
  [style.left.px]="insertMenuPos().left"
  class="fixed bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg z-[9999] py-1 min-w-[200px]"
>
  <button (click)="insertImage()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">image</span> Image
  </button>
  <button (click)="insertTable()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">table_chart</span> Table
  </button>
  <button (click)="insertHorizontalRule()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">horizontal_rule</span> Horizontal Line
  </button>
  <button (click)="insertPageBreak()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">insert_page_break</span> Page Break
  </button>
  <div class="h-px bg-gray-100 dark:bg-gray-700 my-1 mx-3"></div>
  <button (click)="insertDate()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">today</span> Date
  </button>
  <button (click)="insertTime()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">schedule</span> Time
  </button>
  <div class="h-px bg-gray-100 dark:bg-gray-700 my-1 mx-3"></div>
  <button (click)="insertStickyNote()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">sticky_note_2</span> Sticky Note
  </button>
  <button (click)="insertCollapsible()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">expand_more</span> Collapsible
  </button>
</div>

<!-- Dropdown: Alineación -->
<div
  *ngIf="isAlignMenuOpen()"
  [style.top.px]="alignMenuPos().top"
  [style.left.px]="alignMenuPos().left"
  class="fixed bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg z-[9999] py-1 min-w-[190px]"
>
  <button (click)="setAlign('left')" [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentAlign() === 'left'}" class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_align_left</span>
      <span class="text-[13px]">Left Align</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+L</span>
  </button>
  <button (click)="setAlign('center')" [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentAlign() === 'center'}" class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_align_center</span>
      <span class="text-[13px]">Center Align</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+E</span>
  </button>
  <button (click)="setAlign('right')" [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentAlign() === 'right'}" class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_align_right</span>
      <span class="text-[13px]">Right Align</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+R</span>
  </button>
  <button (click)="setAlign('justify')" [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentAlign() === 'justify'}" class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_align_justify</span>
      <span class="text-[13px]">Justify Align</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+J</span>
  </button>
  <div class="h-px bg-gray-100 dark:bg-gray-700 my-1 mx-3"></div>
  <button (click)="indent()" class="w-full flex items-center gap-2 px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">format_indent_increase</span>
    <span class="text-[13px]">Indent</span>
  </button>
  <button (click)="outdent()" class="w-full flex items-center gap-2 px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">format_indent_decrease</span>
    <span class="text-[13px]">Outdent</span>
  </button>
</div>

<!-- Dropdown: Selector de lenguaje (solo en Code Block) -->
<div
  *ngIf="isLangMenuOpen()"
  [style.top.px]="langMenuPos().top"
  [style.left.px]="langMenuPos().left"
  class="fixed bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg z-[9999] py-1 min-w-[150px] max-h-[260px] overflow-y-auto"
>
  <button
    *ngFor="let lang of codeLanguages"
    (click)="setCodeLanguage(lang)"
    [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentLanguage() === lang}"
    class="w-full text-left px-4 py-1.5 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 font-mono"
  >{{ lang }}</button>
</div>

<!-- Popup flotante: Link -->
<div
  *ngIf="isLinkPopupOpen()"
  [style.top.px]="linkPopupPos().top"
  [style.left.px]="linkPopupPos().left"
  class="fixed bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-xl z-[9999] p-3 w-[320px]"
>
  <p class="text-[12px] text-gray-500 mb-2 font-medium">Insert Link</p>
  <input
    type="url"
    [value]="linkInputValue()"
    (input)="linkInputValue.set($any($event.target).value)"
    placeholder="https://example.com"
    class="w-full border border-gray-200 dark:border-gray-600 rounded px-3 py-1.5 text-[13px] bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 outline-none focus:border-blue-400 mb-2"
  >
  <div class="flex justify-end gap-2">
    <button (click)="cancelLink()" class="px-3 py-1.5 text-[12px] text-gray-500 hover:text-gray-700 dark:hover:text-gray-200 rounded hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">Cancel</button>
    <button (click)="confirmLink()" class="px-3 py-1.5 text-[12px] bg-[#18639c] hover:bg-[#145382] text-white rounded transition-colors font-medium">Apply</button>
  </div>
</div>
