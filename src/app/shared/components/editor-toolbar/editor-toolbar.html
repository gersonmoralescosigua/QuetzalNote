<div class="flex w-full h-full items-center gap-1 overflow-x-auto text-gray-600 dark:text-gray-300">

  <button (click)="undo()" class="p-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors">
    <span class="material-icons text-[18px]">undo</span>
  </button>
  <button (click)="redo()" class="p-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors mr-2">
    <span class="material-icons text-[18px]">redo</span>
  </button>

  <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1"></div>

  <!-- Selector de fuente -->
  <button
    (click)="toggleFontMenu($event)"
    class="flex items-center gap-1 px-2 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors"
  >
    <span class="text-[14px] font-serif">T</span>
    <span class="text-[13px]">{{ currentFont() }}</span>
    <span class="material-icons text-[16px]">expand_more</span>
  </button>

  <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1"></div>

  <!-- Selector de párrafo / tipo de bloque -->
  <button
    (click)="toggleHeadingMenu($event)"
    class="flex items-center gap-1 px-2 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors"
  >
    <span class="material-icons text-[18px]">{{ headingMenuIcon() }}</span>
    <span class="text-[13px]">{{ headingLabel() }}</span>
    <span class="material-icons text-[16px]">expand_more</span>
  </button>

  <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1"></div>

  <!-- Tamaño de fuente -->
  <div class="flex items-center gap-1">
    <button (click)="decreaseFontSize()" class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors">
      <span class="material-icons text-[16px]">remove</span>
    </button>
    <span class="text-[13px] w-6 text-center">{{ fontSize() }}</span>
    <button (click)="increaseFontSize()" class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors">
      <span class="material-icons text-[16px]">add</span>
    </button>
  </div>

  <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1"></div>

  <!-- Negrita -->
  <button
    (click)="toggleBold()"
    [ngClass]="{'bg-gray-200 dark:bg-gray-600': isBold()}"
    class="p-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors font-bold text-[14px]"
  >B</button>

  <!-- Cursiva -->
  <button
    (click)="toggleItalic()"
    [ngClass]="{'bg-gray-200 dark:bg-gray-600': isItalic()}"
    class="p-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors italic text-[14px] font-serif"
  >I</button>

  <!-- Subrayado -->
  <button
    (click)="toggleUnderline()"
    [ngClass]="{'bg-gray-200 dark:bg-gray-600': isUnderline()}"
    class="p-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors underline text-[14px]"
  >U</button>

  <!-- Código -->
  <button
    (click)="toggleCode()"
    [ngClass]="{'bg-gray-200 dark:bg-gray-600': isCode()}"
    class="p-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors"
  >
    <span class="material-icons text-[18px]">code</span>
  </button>

  <!-- Link -->
  <button (click)="insertLink()" class="p-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors">
    <span class="material-icons text-[18px]">link</span>
  </button>

  <!-- Color de texto -->
  <button
    (click)="toggleColorMenu($event)"
    class="flex items-center gap-1 px-2 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors"
  >
    <span class="material-icons text-[18px]" [style.border-bottom]="'3px solid ' + currentColor()">format_color_text</span>
    <span class="material-icons text-[16px]">expand_more</span>
  </button>

  <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1 flex-grow"></div>

  <!-- Insert -->
  <button (click)="toggleInsertMenu($event)" class="flex items-center gap-1 px-2 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors">
    <span class="material-icons text-[18px]">add</span>
    <span class="text-[13px]">Insert</span>
    <span class="material-icons text-[16px]">expand_more</span>
  </button>

  <!-- Alineación -->
  <button
    (click)="toggleAlignMenu($event)"
    class="flex items-center gap-1 px-2 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors"
  >
    <span class="material-icons text-[18px]">{{ alignIcon() }}</span>
    <span class="text-[13px]">{{ alignLabel() }}</span>
  </button>
</div>

<!-- Dropdown: Fuente (fixed para escapar del overflow) -->
<div
  *ngIf="isFontMenuOpen()"
  [style.top.px]="fontMenuPos().top"
  [style.left.px]="fontMenuPos().left"
  class="fixed bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg z-[9999] py-1 min-w-[160px]"
>
  <button
    *ngFor="let font of fonts"
    (click)="setFont(font)"
    [style.font-family]="font"
    class="w-full text-left px-4 py-1.5 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >{{ font }}</button>
</div>

<!-- Dropdown: Párrafo / Tipo de bloque -->
<div
  *ngIf="isHeadingMenuOpen()"
  [style.top.px]="headingMenuPos().top"
  [style.left.px]="headingMenuPos().left"
  class="fixed bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg z-[9999] py-1 min-w-[230px]"
>
  <!-- Normal -->
  <button (click)="setHeading(false)"
    [ngClass]="{'bg-gray-100 dark:bg-gray-700': isNormalBlock()}"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_align_left</span>
      <span class="text-[13px]">Normal</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Alt+0</span>
  </button>
  <!-- Heading 1 -->
  <button (click)="setHeading(1)"
    [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentHeading() === 1}"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="text-[11px] font-bold w-4 text-center text-gray-500 dark:text-gray-400">H1</span>
      <span class="text-[15px] font-bold">Heading 1</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Alt+1</span>
  </button>
  <!-- Heading 2 -->
  <button (click)="setHeading(2)"
    [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentHeading() === 2}"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="text-[11px] font-bold w-4 text-center text-gray-500 dark:text-gray-400">H2</span>
      <span class="text-[14px] font-semibold">Heading 2</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Alt+2</span>
  </button>
  <!-- Heading 3 -->
  <button (click)="setHeading(3)"
    [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentHeading() === 3}"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="text-[11px] font-bold w-4 text-center text-gray-500 dark:text-gray-400">H3</span>
      <span class="text-[13px] font-semibold">Heading 3</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Alt+3</span>
  </button>

  <div class="h-px bg-gray-100 dark:bg-gray-700 my-1 mx-3"></div>

  <!-- Numbered List -->
  <button (click)="setList('ordered')"
    [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentList() === 'ordered'}"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_list_numbered</span>
      <span class="text-[13px]">Numbered List</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Shift+7</span>
  </button>
  <!-- Bullet List -->
  <button (click)="setList('bullet')"
    [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentList() === 'bullet'}"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_list_bulleted</span>
      <span class="text-[13px]">Bullet List</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Shift+8</span>
  </button>
  <!-- Check List -->
  <button (click)="setList('check')"
    [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentList() === 'check'}"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">checklist</span>
      <span class="text-[13px]">Check List</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Shift+9</span>
  </button>

  <div class="h-px bg-gray-100 dark:bg-gray-700 my-1 mx-3"></div>

  <!-- Quote -->
  <button (click)="setBlockquote()"
    [ngClass]="{'bg-gray-100 dark:bg-gray-700': isBlockquote()}"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_quote</span>
      <span class="text-[13px]">Quote</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Shift+Q</span>
  </button>
  <!-- Code Block -->
  <button (click)="setCodeBlockFromMenu()"
    [ngClass]="{'bg-gray-100 dark:bg-gray-700': isCode()}"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">code</span>
      <span class="text-[13px]">Code Block</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Alt+C</span>
  </button>
</div>

<!-- Dropdown: Color -->
<div
  *ngIf="isColorMenuOpen()"
  [style.top.px]="colorMenuPos().top"
  [style.left.px]="colorMenuPos().left"
  class="fixed bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg z-[9999] p-2"
>
  <div class="grid grid-cols-6 gap-1">
    <button
      *ngFor="let color of colors"
      (click)="setColor(color)"
      [style.background-color]="color"
      class="w-6 h-6 rounded hover:scale-110 transition-transform border border-gray-200 dark:border-gray-600"
    ></button>
  </div>
</div>

<!-- Dropdown: Insert -->
<div
  *ngIf="isInsertMenuOpen()"
  [style.top.px]="insertMenuPos().top"
  [style.left.px]="insertMenuPos().left"
  class="fixed bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg z-[9999] py-1 min-w-[200px]"
>
  <button (click)="insertHorizontalRule()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">horizontal_rule</span> Horizontal Rule
  </button>
  <button (click)="insertPageBreak()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">insert_page_break</span> Page Break
  </button>
  <button (click)="insertImage()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">image</span> Image
  </button>
  <button (click)="showComingSoon('Draw')" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">gesture</span> Draw
  </button>
  <button (click)="insertTable()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">table_chart</span> Table
  </button>
  <button (click)="showComingSoon('Add Columns')" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">view_column</span> Add Columns
  </button>
  <button (click)="insertEquation()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">functions</span> Equation
  </button>
  <button (click)="insertStickyNote()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">sticky_note_2</span> Sticky Note
  </button>
  <button (click)="insertCollapsible()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">expand_circle_down</span> Collapsible Container
  </button>
  <button (click)="insertDate()" class="w-full flex items-center gap-3 px-4 py-2 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">calendar_today</span> Date
  </button>
</div>

<!-- Dropdown: Alineación -->
<div
  *ngIf="isAlignMenuOpen()"
  [style.top.px]="alignMenuPos().top"
  [style.left.px]="alignMenuPos().left"
  class="fixed bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg z-[9999] py-1 min-w-[220px]"
>
  <button (click)="setAlign('left')"
    [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentAlign() === 'left'}"
    class="w-full flex items-center justify-between px-3 py-1.5 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_align_left</span>
      Left Align
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Shift+L</span>
  </button>
  <button (click)="setAlign('center')"
    [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentAlign() === 'center'}"
    class="w-full flex items-center justify-between px-3 py-1.5 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_align_center</span>
      Center Align
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Shift+E</span>
  </button>
  <button (click)="setAlign('right')"
    [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentAlign() === 'right'}"
    class="w-full flex items-center justify-between px-3 py-1.5 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_align_right</span>
      Right Align
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Shift+R</span>
  </button>
  <button (click)="setAlign('justify')"
    [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentAlign() === 'justify'}"
    class="w-full flex items-center justify-between px-3 py-1.5 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_align_justify</span>
      Justify Align
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Shift+J</span>
  </button>
  <button (click)="setAlign('start')"
    [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentAlign() === 'start'}"
    class="w-full flex items-center gap-2 px-3 py-1.5 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">format_align_left</span>
    Start Align
  </button>
  <button (click)="setAlign('end')"
    [ngClass]="{'bg-gray-100 dark:bg-gray-700': currentAlign() === 'end'}"
    class="w-full flex items-center gap-2 px-3 py-1.5 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="material-icons text-[16px] text-gray-400">format_align_right</span>
    End Align
  </button>

  <div class="h-px bg-gray-100 dark:bg-gray-700 my-1 mx-3"></div>

  <button (click)="outdent()"
    class="w-full flex items-center justify-between px-3 py-1.5 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_indent_decrease</span>
      Outdent
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+[</span>
  </button>
  <button (click)="indent()"
    class="w-full flex items-center justify-between px-3 py-1.5 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_indent_increase</span>
      Indent
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+]</span>
  </button>
</div>
