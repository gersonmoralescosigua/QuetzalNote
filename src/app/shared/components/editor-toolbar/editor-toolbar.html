<!-- editor-toolbar.html — toolbar de Quill, reutilizable en editor y PDF -->

<!-- cuando hay un code block activo, se muestra solo undo/redo + selector de lenguaje -->
<ng-container *ngIf="isCode()">
  <div
    class="flex w-full items-center gap-1.5 text-gray-600 dark:text-gray-300 overflow-x-auto flex-nowrap scrollbar-hide"
  >
    <!-- Undo / Redo siempre presentes -->
    <button
      (click)="undo()"
      title="Undo (Ctrl+Z)"
      class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/arrow-counterclockwise-DvV_j1ZL.svg" class="w-5 h-5 icon-adaptive">
    </button>
    <button
      (click)="redo()"
      title="Redo (Ctrl+Y)"
      class="p-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors mr-2 flex-shrink-0"
    >
      <img src="assets/icons/arrow-clockwise-BEx5aIxD.svg" class="w-5 h-5 icon-adaptive">
    </button>

    <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1.5 flex-shrink-0"></div>

    <!-- Selector de lenguaje del código -->
    <button
      (click)="toggleLangMenu($event)"
      class="flex items-center gap-1 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/code-Bz7YqPM6.svg" class="w-5 h-5 icon-adaptive">
      <span class="text-[13px] font-mono">{{ currentLanguage() }}</span>
      <img src="assets/icons/chevron-down-q-2SJR92.svg" class="w-3 h-3 icon-adaptive">
    </button>

    <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1.5 flex-shrink-0"></div>

    <!-- Alineación (aplica también en code blocks) -->
    <button
      (click)="toggleAlignMenu($event)"
      class="flex items-center gap-1 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/text-left-BqhjlE8f.svg" class="w-5 h-5 icon-adaptive">
      <span class="text-[14px] font-medium">{{ alignLabel() }}</span>
    </button>

    <!-- Salir del code block -->
    <button
      (click)="setCodeBlockFromMenu()"
      title="Exit Code Block"
      class="ml-auto flex items-center gap-1 px-3 py-1.5 text-[12px] text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/mobile_close_icon.svg" class="w-5 h-5 icon-adaptive"> Exit code
    </button>
  </div>
</ng-container>

<!-- toolbar normal -->
<ng-container *ngIf="!isCode()">
  <div
    class="flex w-full items-center gap-1.5 text-gray-700 dark:text-gray-200 overflow-x-auto flex-nowrap scrollbar-hide"
  >
    <!-- undo / redo -->
    <button
      (click)="undo()"
      title="Undo (Ctrl+Z)"
      class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/arrow-counterclockwise-DvV_j1ZL.svg" class="w-5 h-5 icon-adaptive">
    </button>
    <button
      (click)="redo()"
      title="Redo (Ctrl+Y)"
      class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/arrow-clockwise-BEx5aIxD.svg" class="w-5 h-5 icon-adaptive">
    </button>

    <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1.5 flex-shrink-0"></div>

    <!-- fuente -->
    <button
      (click)="toggleFontMenu($event)"
      class="flex items-center gap-1 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/font-family-C3MgrJAJ.svg" class="w-5 h-5 icon-adaptive">
      <span class="text-[12px]">{{ currentFont() }}</span>
      <img src="assets/icons/chevron-down-q-2SJR92.svg" class="w-3 h-3 icon-adaptive">
    </button>

    <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1.5 flex-shrink-0"></div>

    <!-- ── Selector de tipo de bloque (Normal / H1 / H2…) ─────── -->
    <button
      (click)="toggleHeadingMenu($event)"
      class="flex items-center gap-1 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/text-paragraph-Udk-IEvz.svg" class="w-5 h-5 icon-adaptive">
      <span class="text-[12px]">{{ headingLabel() }}</span>
      <img src="assets/icons/chevron-down-q-2SJR92.svg" class="w-3 h-3 icon-adaptive">
    </button>

    <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1.5 flex-shrink-0"></div>

    <!-- tamaño -->
    <div class="flex items-center gap-0.5 flex-shrink-0">
      <button
        (click)="decreaseFontSize()"
        class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors"
      >
        <img src="assets/icons/minus-sign-C-NZTNRl.svg" class="w-3 h-3 icon-adaptive">
      </button>
      <span class="text-[13px] w-7 text-center select-none">{{ fontSize() }}</span>
      <button
        (click)="increaseFontSize()"
        class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors"
      >
        <img src="assets/icons/add-sign-DnNptbsR.svg" class="w-3 h-3 icon-adaptive">
      </button>
    </div>

    <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1.5 flex-shrink-0"></div>

    <!-- negrita -->
    <button
      (click)="toggleBold()"
      title="Bold (Ctrl+B)"
      [ngClass]="{ 'bg-gray-200 dark:bg-gray-600': isBold() }"
      class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/type-bold-nHyCpQJD.svg" class="w-5 h-5 icon-adaptive">
    </button>

    <!-- cursiva -->
    <button
      (click)="toggleItalic()"
      title="Italic (Ctrl+I)"
      [ngClass]="{ 'bg-gray-200 dark:bg-gray-600': isItalic() }"
      class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/type-italic-Y1uCGU3g.svg" class="w-5 h-5 icon-adaptive">
    </button>

    <!-- subrayado -->
    <button
      (click)="toggleUnderline()"
      title="Underline (Ctrl+U)"
      [ngClass]="{ 'bg-gray-200 dark:bg-gray-600': isUnderline() }"
      class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/type-underline-DWBZW6fe.svg" class="w-5 h-5 icon-adaptive">
    </button>

    <!-- código -->
    <button
      (click)="toggleCode()"
      title="Code Block"
      [ngClass]="{ 'bg-gray-200 dark:bg-gray-600': isCode() }"
      class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/code-Bz7YqPM6.svg" class="w-5 h-5 icon-adaptive">
    </button>

    <!-- link -->
    <button
      (click)="openLinkPopup()"
      title="Insert Link"
      class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/link-BGGrnw_x.svg" class="w-5 h-5 icon-adaptive">
    </button>

    <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1.5 flex-shrink-0"></div>

    <!-- color -->
    <button
      (click)="toggleColorMenu($event)"
      title="Text Color"
      class="flex items-center gap-1 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
        <img src="assets/icons/font-color-BytEaRp9.svg" class="w-5 h-5 icon-adaptive">
        <div style="width:16px;height:2px;border-radius:1px;"
             [style.background-color]="currentColor()">
        </div>
      </div>
      <img src="assets/icons/chevron-down-q-2SJR92.svg" class="w-3 h-3 icon-adaptive">
    </button>

    <!-- Aa: uppercase, lowercase, capitalize -->
    <button
      (click)="toggleAaMenu($event)"
      title="Text tools"
      class="flex items-center gap-0.5 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <span class="text-[13px] font-semibold">Aa</span>
      <img src="assets/icons/chevron-down-q-2SJR92.svg" class="w-3 h-3 icon-adaptive">
    </button>

    <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 mx-1.5 flex-shrink-0"></div>

    <!-- insertar -->
    <button
      (click)="toggleInsertMenu($event)"
      class="flex items-center gap-1 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/plus-DanGKpCK.svg" class="w-5 h-5 icon-adaptive">
      <span class="text-[12px]">Insert</span>
      <img src="assets/icons/chevron-down-q-2SJR92.svg" class="w-3 h-3 icon-adaptive">
    </button>

    <!-- alineación -->
    <button
      (click)="toggleAlignMenu($event)"
      class="flex items-center gap-1 px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors flex-shrink-0"
    >
      <img src="assets/icons/text-left-BqhjlE8f.svg" class="w-5 h-5 icon-adaptive">
      <span class="text-[12px]">{{ alignLabel() }}</span>
      <img src="assets/icons/chevron-down-q-2SJR92.svg" class="w-3 h-3 icon-adaptive">
    </button>
  </div>
</ng-container>

<!-- dropdowns — fixed para escapar del overflow del toolbar -->

<!-- Dropdown: Fuente -->
<div
  *ngIf="isFontMenuOpen()"
  [style.top.px]="fontMenuPos().top"
  [style.left.px]="fontMenuPos().left"
  class="fixed bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg z-[9999] py-1 min-w-[170px]"
>
  <button
    *ngFor="let font of fonts"
    (click)="setFont(font)"
    [style.font-family]="font"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': currentFont() === font }"
    class="w-full text-left px-4 py-1.5 text-[13px] hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    {{ font }}
  </button>
</div>

<!-- Dropdown: Tipo de bloque (Normal / Headings / Listas…) -->
<div
  *ngIf="isHeadingMenuOpen()"
  [style.top.px]="headingMenuPos().top"
  [style.left.px]="headingMenuPos().left"
  class="fixed bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-lg shadow-lg z-[9999] py-1 min-w-[230px]"
>
  <!-- Normal -->
  <button
    (click)="setHeading(false)"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': isNormalBlock() }"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_align_left</span>
      <span class="text-[14px] font-medium">Normal</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Alt+0</span>
  </button>
  <!-- H1 -->
  <button
    (click)="setHeading(1)"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': currentHeading() === 1 }"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    <span class="flex items-center gap-2">
      <span class="text-[11px] font-bold w-4 text-center text-gray-400">H1</span>
      <span class="text-[15px] font-bold">Heading 1</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Alt+1</span>
  </button>
  <!-- H2 -->
  <button
    (click)="setHeading(2)"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': currentHeading() === 2 }"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    <span class="flex items-center gap-2">
      <span class="text-[11px] font-bold w-4 text-center text-gray-400">H2</span>
      <span class="text-[14px] font-semibold">Heading 2</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Alt+2</span>
  </button>
  <!-- H3 -->
  <button
    (click)="setHeading(3)"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': currentHeading() === 3 }"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    <span class="flex items-center gap-2">
      <span class="text-[11px] font-bold w-4 text-center text-gray-400">H3</span>
      <span class="text-[13px] font-semibold">Heading 3</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Alt+3</span>
  </button>
  <div class="h-px bg-gray-100 dark:bg-gray-700 my-1 mx-3"></div>
  <!-- Numbered List -->
  <button
    (click)="setList('ordered')"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': currentList() === 'ordered' }"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_list_numbered</span>
      <span class="text-[14px] font-medium">Numbered List</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Shift+7</span>
  </button>
  <!-- Bullet List -->
  <button
    (click)="setList('bullet')"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': currentList() === 'bullet' }"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_list_bulleted</span>
      <span class="text-[14px] font-medium">Bullet List</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Shift+8</span>
  </button>
  <!-- Check List -->
  <button
    (click)="setList('check')"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': currentList() === 'check' }"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">checklist</span>
      <span class="text-[14px] font-medium">Check List</span>
    </span>
    <span class="text-[11px] text-gray-400">Ctrl+Shift+9</span>
  </button>
  <div class="h-px bg-gray-100 dark:bg-gray-700 my-1 mx-3"></div>
  <!-- Quote -->
  <button
    (click)="setBlockquote()"
    [ngClass]="{ 'bg-gray-100 dark:bg-gray-700': isBlockquote() }"
    class="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200"
  >
    <span class="flex items-center gap-2">
      <span class="material-icons text-[16px] text-gray-400">format_quote</span>
