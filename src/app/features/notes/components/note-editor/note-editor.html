<!-- ══════════════════════════════════════════════════════════════════════ -->
<!-- NOTE EDITOR — Editor de notas con Quill                             -->
<!-- Fiel a onlinenotepad.io: footer con contadores, Copy, Download,     -->
<!-- Help me write y Upload Doc                                           -->
<!-- ══════════════════════════════════════════════════════════════════════ -->

<div class="flex flex-col h-full overflow-hidden">
  <!-- ── Área del editor Quill ────────────────────────────────────────── -->
  <div class="flex-1 overflow-y-auto px-8 pt-4 pb-2">
    <quill-editor
      (onEditorCreated)="onEditorCreated($event)"
      (onContentChanged)="onEditorChanged($event)"
      [modules]="editorModules"
      placeholder="Start typing your note..."
      class="w-full text-gray-800 dark:text-gray-100 border-none outline-none min-h-full"
    >
    </quill-editor>
    <!-- Overlay con "Help me write" (solo cuando no hay texto) -->
    <div
      *ngIf="!hasText()"
      class="absolute inset-0 flex flex-col items-start justify-start pt-12 px-8 pointer-events-none"
    >
      <div class="pointer-events-auto">
        <button
          class="flex items-center gap-2 text-[13px] text-gray-400 hover:text-[#18639c] transition-colors"
        >
          <span class="material-icons text-[16px] text-[#18639c]">auto_awesome</span>
          <span>Help me write</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── Footer del editor ─────────────────────────────────────────────── -->
  <!-- Fiel al original: Upload Doc | Help me write | [espacio] | Copy | Download | Clear -->
  <div
    class="flex-shrink-0 border-t border-gray-100 dark:border-gray-700 px-4 md:px-8 py-2 flex items-center justify-between text-gray-500 dark:text-gray-400 bg-white dark:bg-gray-800"
  >
    <!-- Lado izquierdo: Upload + Help me write -->
    <div class="flex items-center gap-3">
      <!-- Upload Doc -->
      <button
        *ngIf="!hasText()"
        (click)="uploadDoc()"
        class="flex items-center gap-1.5 text-[13px] font-medium hover:text-gray-800 dark:hover:text-white transition-colors"
      >
        <span class="material-icons text-[18px]">upload_file</span>
        Upload Doc
      </button>

      <span *ngIf="!hasText()" class="text-gray-300 dark:text-gray-600">|</span>
      <!-- Separador + contadores de palabras/caracteres -->
      <span
        *ngIf="hasText()"
        class="hidden md:flex items-center gap-3 text-[13px] text-gray-400 ml-2 pl-2 border-l border-gray-200 dark:border-gray-600"
      >
        <span>Words: {{ wordCount() }}</span>
        <span>Characters: {{ charCount() }}</span>
      </span>
    </div>

    <!-- Lado derecho: Copy | Download | Clear -->
    <div class="flex items-center gap-1">
      <!-- Copy (con feedback visual) -->
      <button
        (click)="copyContent()"
        title="Copy content"
        [ngClass]="copyDone() ? 'text-green-500' : ''"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded text-[13px] font-medium hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
      >
        <span class="material-icons text-[17px]">
          {{ copyDone() ? 'check' : 'content_copy' }}
        </span>
        <span class="hidden md:inline">{{ copyDone() ? 'Copied!' : 'Copy' }}</span>
      </button>

      <!-- Download (abre modal de selección de formato) -->
      <button
        (click)="downloadNote()"
        title="Download note"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded text-[13px] font-medium hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
      >
        <span class="material-icons text-[17px]">download</span>
        <span class="hidden md:inline">Download</span>
      </button>

      <!-- Clear Editor -->
      <button
        *ngIf="hasText()"
        (click)="promptClearEditor()"
        title="Clear editor"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded text-[13px] font-medium text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors"
      >
        <span class="material-icons text-[17px]">clear_all</span>
        <span class="hidden md:inline">Clear</span>
      </button>
    </div>
  </div>
</div>
