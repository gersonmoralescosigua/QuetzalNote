<!-- NOTE EDITOR -->
<div class="w-full flex flex-col" style="height:100%;min-height:0;">

  <!-- Zona scrollable — min-h-0 es clave en flex para que no crezca sin límite -->
  <div class="flex-1 overflow-y-auto min-h-0">
    <div class="max-w-5xl mx-auto pt-6 px-8 pb-6">

      <!-- Help me write — solo cuando el editor está vacío -->
      <button
        [class.hidden]="hasText()"
        class="w-fit mb-4 flex items-center gap-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 px-4 py-1.5 rounded-full shadow-sm hover:shadow-md transition-shadow text-[14px] font-medium text-gray-700 dark:text-gray-200"
      >
        <span class="material-icons text-teal-500 text-[18px]">auto_awesome</span>
        Help me write
      </button>

      <!-- Editor Quill -->
      <quill-editor
        (onEditorCreated)="onEditorCreated($event)"
        (onContentChanged)="onEditorChanged($event)"
        [modules]="editorModules"
        placeholder="Start writing, press '/' for commands..."
        class="w-full text-gray-800 dark:text-gray-100 border-none outline-none"
      ></quill-editor>

    </div>
  </div>

  <!-- Barra inferior fija — siempre visible al fondo -->
  <div class="flex-shrink-0 px-8 py-2 flex items-center justify-between text-gray-500 dark:text-gray-400 bg-white dark:bg-gray-800 border-t border-gray-100 dark:border-gray-700">

    <!-- Izquierda: Upload Doc (sin texto) o contadores (con texto) -->
    <div class="text-[13px]">
      <button
        *ngIf="!hasText()"
        (click)="uploadDoc()"
        class="flex items-center gap-1.5 hover:text-gray-800 dark:hover:text-white transition-colors font-medium"
      >
        <span class="material-icons text-[18px]">upload</span>
        Upload Doc
      </button>
      <span *ngIf="hasText()">
        Words: {{ wordCount() }}&nbsp;&nbsp;Characters: {{ charCount() }}
      </span>
    </div>

    <!-- Derecha: Copy, Download, Clear -->
    <div class="flex items-center gap-1">
      <button
        (click)="copyContent()"
        [ngClass]="copyDone() ? 'text-green-500' : ''"
        [title]="copyDone() ? 'Copied!' : 'Copy content'"
        class="p-1.5 rounded hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
      >
        <span class="material-icons text-[20px]">{{ copyDone() ? 'check' : 'content_copy' }}</span>
      </button>
      <button
        (click)="downloadNote()"
        title="Download as .txt"
        class="p-1.5 rounded hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
      >
        <span class="material-icons text-[20px]">file_download</span>
      </button>
      <button
        (click)="promptClearEditor()"
        title="Clear content"
        class="p-1.5 rounded hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-500 transition-colors"
      >
        <span class="material-icons text-[20px]">delete_outline</span>
      </button>
    </div>

  </div>
</div>
